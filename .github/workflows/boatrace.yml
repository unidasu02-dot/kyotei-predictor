name: ボートレース自動更新
on:
  schedule:
    - cron: '*/5 0-15 * * *'  # JSTレース時間帯に5分間隔（調整）
  workflow_dispatch:  # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas gspread google-auth
      - name: Run script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}  # JSON内容をSecretsに
        run: python boatrace_fetch.py
