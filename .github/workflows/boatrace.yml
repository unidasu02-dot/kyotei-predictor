name: ボートレース自動更新

on:
  schedule:
    - cron: '*/5 0-15 * * *'   # 5分間隔（0時〜15時 JST相当）
  workflow_dispatch:           # 手動実行用（今後も残す）

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests pandas gspread google-auth
      
      - name: Run script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python boatrace_fetch.py
